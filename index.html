<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PinGenius - AI Pinterest Pin Generator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
        }
    </script>

    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-200 antialiased m-0 p-0 dark:bg-slate-900">

    <!-- Top Header -->
    <header class="fixed top-0 left-0 w-full h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-red-500 flex items-center justify-center text-white">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
            </div>
            <span class="font-bold dark:text-white text-lg tracking-tight">PinGenius</span>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1 text-sm font-semibold bg-slate-100 dark:bg-slate-700 dark:text-white px-3 py-1.5 rounded-full" onclick="alert('Premium feature mock')">
                <svg class="text-amber-500" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/></svg>
                <span>5</span>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="pt-20 pb-24 px-4 w-full max-w-lg mx-auto min-h-screen">
        <div class="text-center mt-20 text-slate-400 font-bold animate-pulse">Loading Application...</div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 w-full bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex justify-around p-2 pb-6 z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center p-2 rounded-xl text-red-600 bg-red-50 dark:bg-red-500/10 font-bold flex-1">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></svg>
            <span class="text-[11px] mt-1">Generator</span>
        </button>
        
        <button onclick="switchTab('trending')" id="nav-trending" class="flex flex-col items-center p-2 rounded-xl text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700 flex-1">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
            <span class="text-[11px] mt-1">Trending</span>
        </button>

        <button onclick="switchTab('saved')" id="nav-saved" class="flex flex-col items-center p-2 rounded-xl text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700 flex-1">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
            <span class="text-[11px] mt-1">Saved</span>
        </button>
    </nav>

    <!-- Application Logic -->
    <script>
        let currentTab = 'home';
        let isGenerating = false;
        let errorMessage = '';

        const spinnerSvg = `<svg class="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;

        const TRENDING_TOPICS = {
            "Business": ["Faceless Marketing", "Passive Income", "Etsy Shop"],
            "Health": ["Somatic Exercises", "Meal Prep", "Workouts"]
        };

        function updateNavStyles() {
            const tabs = ['home', 'trending', 'saved'];
            tabs.forEach(tab => {
                const btn = document.getElementById('nav-' + tab);
                if (tab === currentTab) {
                    btn.className = "flex flex-col items-center p-2 rounded-xl text-red-600 bg-red-50 dark:bg-red-500/10 font-bold flex-1";
                } else {
                    btn.className = "flex flex-col items-center p-2 rounded-xl text-slate-500 hover:bg-slate-50 dark:text-slate-400 dark:hover:bg-slate-700 font-medium flex-1";
                }
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            updateNavStyles();
            render();
        }

        function startGeneration() {
            const input = document.getElementById('topic-input').value;
            if (!input.trim()) {
                errorMessage = "Please enter a topic first!";
                render();
                return;
            }
            isGenerating = true;
            errorMessage = '';
            render();
            setTimeout(() => {
                isGenerating = false;
                errorMessage = "API connection successful! (Add a Gemini API Key to generate real pins)";
                render();
            }, 2000);
        }AIzaSyAzlO3GgrSWUcVEbh5zW99iEq0nwrrR__M

        function render() {
            const contentDiv = document.getElementById('app-content');
            
            if (currentTab === 'home') {
                contentDiv.innerHTML = `
                    <div class="fade-in">
                        <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 text-center w-full">
                            <h2 class="text-2xl font-bold mb-2 dark:text-white">Create Viral Pins</h2>
                            <p class="text-slate-500 dark:text-slate-400 mb-6 text-sm">Enter a topic and our AI will generate a complete Pinterest pin.</p>
                            
                            <div class="flex flex-col gap-3 w-full">
                                <input 
                                    type="text" 
                                    id="topic-input"
                                    placeholder="e.g. Passive Income Ideas..." 
                                    class="w-full px-4 py-4 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-red-500 outline-none text-base"
                                    ${isGenerating ? 'disabled' : ''}
                                />
                                <button 
                                    onclick="startGeneration()"
                                    ${isGenerating ? 'disabled' : ''}
                                    class="bg-red-500 disabled:opacity-50 text-white px-6 py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 w-full active:scale-95 transition-transform"
                                >
                                    ${isGenerating ? spinnerSvg + ' Generating...' : 'Generate Pin'}
                                </button>
                            </div>
                            ${errorMessage ? `<p class="text-red-500 text-sm mt-4 font-semibold">${errorMessage}</p>` : ''}
                        </div>
                    </div>
                `;
            } 
            else if (currentTab === 'trending') {
                let html = `<div class="fade-in space-y-4">
                    <h2 class="text-2xl font-bold dark:text-white mb-4 text-center">Trending Ideas</h2>`;
                
                for (const [category, topics] of Object.entries(TRENDING_TOPICS)) {
                    html += `
                        <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-700">
                            <h3 class="font-bold text-md mb-3 flex items-center gap-2 dark:text-white">
                                <span class="w-2 h-2 rounded-full bg-red-500"></span> ${category}
                            </h3>
                            <ul class="space-y-2">
                                ${topics.map(topic => `
                                    <li class="bg-slate-50 dark:bg-slate-900/50 p-3 rounded-lg text-sm font-medium dark:text-slate-200">
                                        ${topic}
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                }
                html += `</div>`;
                contentDiv.innerHTML = html;
            }
            else if (currentTab === 'saved') {
                contentDiv.innerHTML = `
                    <div class="fade-in text-center py-10 flex flex-col items-center">
                        <div class="w-16 h-16 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-400 mb-4">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
                        </div>
                        <h2 class="text-xl font-bold mb-2 dark:text-white">No Saved Pins</h2>
                        <p class="text-slate-500 dark:text-slate-400 text-sm">Your generated pins will appear here.</p>
                    </div>
                `;
            }
        }

        window.onload = () => { render(); };
    </script>
</body>
</html>
